spring.application.name=document-management-system

spring.datasource.url=jdbc:postgresql://localhost:5432/staj_db
spring.datasource.username=staj_user
spring.datasource.password=staj_password

# Entity'leri görünce tabloları otomatik oluşturur/günceller
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Settings (Secret key should be at least 256 bits for HS256)
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# application.yml: Hiyerarşik bir görünüm sağladığı için properties yerine YAML
# kullanılabilirdi (Modern projelerde genelde YAML tercih edilir).

# Normal şartlar altında mikroservis mimarilerinde asimetrik şifreleme kullanılı
# fakat bu proje dökümanında jwt istendiği için jwt kullandım. asimetrik şifrelemede
#  Gizli bir metin yerine Public/Private Key çifti (RS256) kullanılarak daha güvenli
#  enterprise seviye bir imzalama yöntemidir.